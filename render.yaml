services:
  - type: web
    name: salon-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run render-build
    preDeployCommand: npm run deploy:migrate
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: salon-postgres
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d

databases:
  - name: salon-postgres
    plan: free
    databaseName: salon
    user: salon
